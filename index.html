<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mario Game JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🍄 Mario JS Game</h1>
    <p>Pontuação: <span id="score">0</span></p>

    <button onclick="iniciarJogo()">Iniciar</button>

    <div id="game">
        <div id="mario">🍄</div>
        <div id="coin">🪙</div>
        <div id="enemy">👾</div>
    </div>

    <audio id="coinSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
